<div class="auth-page">
  <div class="auth-card">
    <h2 class="auth-title">Crear cuenta</h2>
    <form class="auth-form" (ngSubmit)="onSubmit()">
      <div class="auth-field">
        <label class="auth-label" for="nombre">Nombre</label>
        <input
          id="nombre"
          class="auth-input"
          [class.input-error]="errors()['nombre']"
          type="text"
          autocomplete="given-name"
          placeholder="Juan"
          [(ngModel)]="nombre"
          name="nombre"
        />
        @if (errors()['nombre']) {
          <p class="auth-error">Nombre requerido</p>
        }
      </div>
      <div class="auth-field">
        <label class="auth-label" for="apellidos">Apellidos</label>
        <input
          id="apellidos"
          class="auth-input"
          [class.input-error]="errors()['apellidos']"
          type="text"
          autocomplete="family-name"
          placeholder="Pérez García"
          [(ngModel)]="apellidos"
          name="apellidos"
        />
        @if (errors()['apellidos']) {
          <p class="auth-error">Apellidos requeridos</p>
        }
      </div>
      <div class="auth-field">
        <label class="auth-label" for="email">Email</label>
        <input
          id="email"
          class="auth-input"
          [class.input-error]="errors()['email']"
          type="email"
          autocomplete="email"
          placeholder="tu@email.com"
          [(ngModel)]="email"
          name="email"
        />
        @if (errors()['email']) {
          <p class="auth-error">Email requerido</p>
        }
      </div>
      <div class="auth-field">
        <label class="auth-label" for="password">Contraseña</label>
        <input
          id="password"
          class="auth-input"
          [class.input-error]="errors()['password']"
          type="password"
          autocomplete="new-password"
          placeholder="mínimo 8 caracteres"
          [(ngModel)]="password"
          name="password"
        />
        @if (errors()['password']) {
          <p class="auth-error">Mínimo 8 caracteres</p>
        }
      </div>
      @if (error()) {
        <p class="auth-error">{{ error() }}</p>
      }
      <button class="hero-button auth-button" type="submit" [disabled]="submitting()">
        {{ submitting() ? 'Creando...' : 'Crear cuenta' }}
      </button>
    </form>
  </div>
</div>
